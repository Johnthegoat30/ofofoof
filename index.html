<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Multiplayer FPS Game</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #222; color: #fff; }
        canvas { display: block; }
        #hud { position: absolute; top: 10px; left: 10px; }
        .team-display { font-size: 20px; }
        .stats { font-size: 16px; }
        #shop, #inventory { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
        <div class="team-display">
            Team: <span id="teamDisplay"></span>
        </div>
        <div class="stats">
            Kills: <span id="killsCount">0</span> | Ammo: <span id="ammoCount">30</span> | Health: <span id="healthBar">100</span>
        </div>
        <div class="current-weapon">Weapon: <span id="currentWeapon">Rifle</span></div>
    </div>
    <script>
        // Constants and Variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let kills = 0; let health = 100; let team = 'Purple';
        let currentWeapon = 'Rifle';

        // Helper functions
        function updateHUD() {
            document.getElementById('killsCount').innerText = kills;
            document.getElementById('healthBar').innerText = health;
            document.getElementById('currentWeapon').innerText = currentWeapon;
            document.getElementById('teamDisplay').innerText = team;
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw game world, players, and other elements here
            updateHUD();
            requestAnimationFrame(gameLoop);
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
