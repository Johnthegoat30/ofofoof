<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ofofoof Shooter Game</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; }
        canvas { border: 1px solid #fff; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game Variables
        let enemies = [];
        let player = { x: 400, y: 300, health: 100 };

        function init() {
            spawnEnemies();
            gameLoop();
        }

        function spawnEnemies() {
            for (let i = 0; i < 10; i++) {
                enemies.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height });
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPlayer();
            drawEnemies();
            requestAnimationFrame(gameLoop);
        }

        function drawPlayer() {
            ctx.fillStyle = 'green';
            ctx.fillRect(player.x, player.y, 50, 50);
        }

        function drawEnemies() {
            ctx.fillStyle = 'red';
            enemies.forEach(enemy => {
                ctx.fillRect(enemy.x, enemy.y, 40, 40);
            });
        }

        // Add more game mechanics here (weapons, shop, skins, etc.)

        init();
    </script>
</body>
</html>
