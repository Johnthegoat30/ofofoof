<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFOFOOF - Shooter Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        #gameContainer {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        #gameHeader {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #00ff00;
        }

        #gameTitle {
            font-size: 28px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }

        .stats {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .stat-item {
            background: rgba(0, 255, 0, 0.1);
            padding: 10px 20px;
            border-radius: 5px;
            border: 2px solid #00ff00;
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #00ff00;
        }

        #gameArea {
            flex: 1;
            display: flex;
            position: relative;
        }

        #gameCanvas {
            flex: 1;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            cursor: crosshair;
        }

        #sidePanel {
            width: 300px;
            background: rgba(0, 0, 0, 0.9);
            border-left: 3px solid #00ff00;
            padding: 20px;
            overflow-y: auto;
        }

        .panel-section {
            margin-bottom: 25px;
            border: 2px solid #00ff00;
            padding: 15px;
            border-radius: 8px;
            background: rgba(0, 255, 0, 0.05);
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #00ff00;
            margin-bottom: 10px;
            text-transform: uppercase;
            border-bottom: 2px solid #00ff00;
            padding-bottom: 8px;
        }

        .weapon-item, .skin-item {
            background: rgba(50, 50, 50, 0.8);
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 5px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .weapon-item:hover, .skin-item:hover {
            border-color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
        }

        .weapon-item.active {
            border-color: #ffff00;
            background: rgba(255, 255, 0, 0.2);
        }

        .item-name {
            font-weight: bold;
            color: #00ff00;
            font-size: 14px;
        }

        .item-stats {
            font-size: 11px;
            color: #aaa;
            margin-top: 5px;
        }

        .item-price {
            font-size: 12px;
            color: #ffff00;
            margin-top: 5px;
        }

        #shopPanel {
            width: 350px;
            background: rgba(0, 0, 0, 0.9);
            border-left: 3px solid #ff6600;
            padding: 20px;
            overflow-y: auto;
        }

        .shop-item {
            background: linear-gradient(135deg, #ff6600, #ff8c00);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .shop-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(255, 102, 0, 0.5);
            border-color: #fff;
        }

        .shop-item-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .shop-item-price {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
        }

        .currency-icon {
            display: inline-block;
            margin-left: 5px;
        }

        button {
            background: linear-gradient(135deg, #00ff00, #00cc00);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            width: 100%;
            margin-top: 5px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px #00ff00;
        }

        #enemyCount {
            background: rgba(255, 0, 0, 0.2);
            padding: 10px 20px;
            border-radius: 5px;
            border: 2px solid #ff0000;
        }

        .enemy {
            position: absolute;
            width: 30px;
            height: 40px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border-radius: 5px;
            border: 2px solid #ffff00;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            color: #fff;
        }

        #gameOverScreen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #00ff00;
        }

        #gameOverScreen.show {
            display: flex;
        }

        #gameOverScreen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ff00;
        }

        #gameOverScreen p {
            font-size: 20px;
            margin-bottom: 30px;
        }

        #gameOverScreen button {
            padding: 15px 40px;
            font-size: 18px;
        }

        .weapon-bar {
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .ammo-bar {
            background: #333;
            height: 10px;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 5px;
        }

        .ammo-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #ffff00);
            width: 100%;
        }

        @media (max-width: 1024px) {
            #sidePanel, #shopPanel {
                width: 200px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="gameHeader">
            <div id="gameTitle">⚔️ OFOFOOF SHOOTER ⚔️</div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">Kills</div>
                    <div class="stat-value" id="killCount">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Coins 💰</div>
                    <div class="stat-value" id="coinCount">1000</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Gems 💎</div>
                    <div class="stat-value" id="gemCount">50</div>
                </div>
                <div class="stat-item" id="enemyCount">
                    <div class="stat-label">Enemies</div>
                    <div class="stat-value" id="enemyValue">0</div>
                </div>
            </div>
        </div>

        <div id="gameArea">
            <canvas id="gameCanvas"></canvas>

            <div id="sidePanel">
                <div class="panel-section">
                    <div class="section-title">🎯 Current Weapon</div>
                    <div id="currentWeaponDisplay" class="weapon-item">
                        <div class="item-name">Rifle</div>
                        <div class="item-stats">Damage: 25 | Fire Rate: 10</div>
                    </div>
                    <div class="weapon-bar">
                        <div style="margin-bottom: 5px;">Ammo: <span id="ammoCount">30</span>/30</div>
                        <div class="ammo-bar">
                            <div class="ammo-fill" id="ammoBar"></div>
                        </div>
                    </div>
                    <button onclick="reloadWeapon()">Reload</button>
                </div>

                <div class="panel-section">
                    <div class="section-title">🔫 Weapons</div>
                    <div id="weaponsList"></div>
                </div>

                <div class="panel-section">
                    <div class="section-title">🎨 Skins & Wraps</div>
                    <div id="skinsList"></div>
                </div>

                <div class="panel-section">
                    <div class="section-title">💀 Finishers</div>
                    <div id="finishersList"></div>
                </div>
            </div>

            <div id="shopPanel">
                <div class="section-title">🛍️ SHOP</div>
                <div id="shopItems"></div>
            </div>
        </div>
    </div>

    <div id="gameOverScreen">
        <h1>GAME OVER</h1>
        <p id="gameOverStats"></p>
        <button onclick="restartGame()">Play Again</button>
    </div>

    <script>
        // Game State
        const gameState = {
            kills: 0,
            coins: 1000,
            gems: 50,
            currentWeapon: 'rifle',
            currentSkin: 'default',
            currentFinisher: 'default',
            inventory: {
                weapons: ['rifle', 'sniper'],
                skins: ['default', 'dragon'],
                finishers: ['default', 'explosion']
            },
            weaponStats: {
                ammo: 30,
                maxAmmo: 30
            },
            gameRunning: true,
            health: 100
        };

        // Weapons Database
        const weapons = {
            rifle: { name: 'Assault Rifle', damage: 25, fireRate: 10, cost: 500, rarity: 'common' },
            sniper: { name: 'Sniper Rifle', damage: 75, fireRate: 3, cost: 1500, rarity: 'rare' },
            shotgun: { name: 'Shotgun', damage: 50, fireRate: 5, cost: 1200, rarity: 'rare' },
            pistol: { name: 'Pistol', damage: 15, fireRate: 15, cost: 300, rarity: 'common' },
            smg: { name: 'SMG', damage: 18, fireRate: 20, cost: 800, rarity: 'uncommon' }
        };

        // Skins Database
        const skins = {
            default: { name: 'Default', cost: 0, type: 'skin' },
            dragon: { name: 'Dragon', cost: 500, type: 'skin' },
            gold: { name: 'Gold', cost: 750, type: 'skin' },
            neon: { name: 'Neon', cost: 600, type: 'skin' },
            camo: { name: 'Camouflage', cost: 400, type: 'skin' }
        };

        // Finishers Database
        const finishers = {
            default: { name: 'Default Finish', cost: 0, type: 'finisher' },
            explosion: { name: 'Explosion', cost: 300, type: 'finisher' },
            freeze: { name: 'Freeze', cost: 350, type: 'finisher' },
            lightning: { name: 'Lightning', cost: 400, type: 'finisher' },
            nuclear: { name: 'Nuclear', cost: 800, gems: true, type: 'finisher' }
        };

        // Canvas Setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const gameArea = document.getElementById('gameArea');
            canvas.width = gameArea.clientWidth - 300 - 350;
            canvas.height = gameArea.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Enemy System
        let enemies = [];

        class Enemy {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.width = 30;
                this.height = 40;
                this.hp = 50;
                this.maxHp = 50;
                this.speed = 2;
            }

            update() {
                this.x += (Math.random() - 0.5) * this.speed;
                this.y += (Math.random() - 0.5) * this.speed;
                this.x = Math.max(0, Math.min(canvas.width - this.width, this.x));
                this.y = Math.max(0, Math.min(canvas.height - this.height, this.y));
            }

            draw() {
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);

                // Health bar
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(this.x, this.y - 10, (this.hp / this.maxHp) * this.width, 5);
                ctx.strokeStyle = '#fff';
                ctx.strokeRect(this.x, this.y - 10, this.width, 5);
            }

            takeDamage(damage) {
                this.hp -= damage;
                return this.hp <= 0;
            }
        }

        function spawnEnemies() {
            const enemyCount = 3 + Math.floor(gameState.kills / 5);
            for (let i = 0; i < enemyCount; i++) {
                enemies.push(new Enemy());
            }
            updateEnemyDisplay();
        }

        function updateEnemyDisplay() {
            document.getElementById('enemyValue').textContent = enemies.length;
        }

        // Game Shooting
        canvas.addEventListener('click', (e) => {
            if (!gameState.gameRunning) return;

            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            if (gameState.weaponStats.ammo > 0) {
                gameState.weaponStats.ammo--;
                updateAmmoDisplay();

                for (let i = enemies.length - 1; i >= 0; i--) {
                    const enemy = enemies[i];
                    const distance = Math.sqrt(
                        Math.pow(mouseX - (enemy.x + enemy.width / 2), 2) +
                        Math.pow(mouseY - (enemy.y + enemy.height / 2), 2)
                    );

                    if (distance < 40) {
                        const currentWeapon = weapons[gameState.currentWeapon];
                        if (enemy.takeDamage(currentWeapon.damage)) {
                            enemies.splice(i, 1);
                            gameState.kills++;
                            gameState.coins += 100;
                            if (Math.random() < 0.3) gameState.gems += 1;
                            updateStats();
                            updateEnemyDisplay();
                        }
                        break;
                    }
                }
            }
        });

        // Update Display Functions
        function updateStats() {
            document.getElementById('killCount').textContent = gameState.kills;
            document.getElementById('coinCount').textContent = gameState.coins;
            document.getElementById('gemCount').textContent = gameState.gems;
        }

        function updateAmmoDisplay() {
            document.getElementById('ammoCount').textContent = gameState.weaponStats.ammo;
            const percentage = (gameState.weaponStats.ammo / gameState.weaponStats.maxAmmo) * 100;
            document.getElementById('ammoBar').style.width = percentage + '%';
        }

        function reloadWeapon() {
            gameState.weaponStats.ammo = gameState.weaponStats.maxAmmo;
            updateAmmoDisplay();
        }

        // Weapon Selection
        function selectWeapon(weaponName) {
            gameState.currentWeapon = weaponName;
            const weapon = weapons[weaponName];
            gameState.weaponStats.maxAmmo = weaponName === 'sniper' ? 10 : 30;
            gameState.weaponStats.ammo = gameState.weaponStats.maxAmmo;
            
            document.getElementById('currentWeaponDisplay').innerHTML = `
                <div class="item-name">${weapon.name}</div>
                <div class="item-stats">Damage: ${weapon.damage} | Fire Rate: ${weapon.fireRate}</div>
            `;
            
            document.querySelectorAll('.weapon-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.weapon-item').classList.add('active');
            updateAmmoDisplay();
        }

        // Skin Selection
        function selectSkin(skinName) {
            gameState.currentSkin = skinName;
            document.querySelectorAll('.skin-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.skin-item').classList.add('active');
        }

        // Finisher Selection
        function selectFinisher(finisherName) {
            gameState.currentFinisher = finisherName;
        }

        // Shop Buy Function
        function buyItem(itemName, cost, gemCost = false) {
            const currency = gemCost ? gameState.gems : gameState.coins;
            const currencyName = gemCost ? 'gems' : 'coins';

            if (currency >= cost) {
                if (gemCost) {
                    gameState.gems -= cost;
                } else {
                    gameState.coins -= cost;
                }
                
                if (weapons[itemName]) {
                    gameState.inventory.weapons.push(itemName);
                } else if (skins[itemName]) {
                    gameState.inventory.skins.push(itemName);
                } else if (finishers[itemName]) {
                    gameState.inventory.finishers.push(itemName);
                }
                
                updateStats();
                renderUI();
                alert(`Purchased ${itemName}!`);
            } else {
                alert(`Not enough ${currencyName}!`);
            }
        }

        // Render Weapons List
        function renderWeapons() {
            const weaponsList = document.getElementById('weaponsList');
            weaponsList.innerHTML = '';
            
            for (const weaponName in weapons) {
                const weapon = weapons[weaponName];
                const owned = gameState.inventory.weapons.includes(weaponName);
                const isActive = gameState.currentWeapon === weaponName;
                
                const weaponDiv = document.createElement('div');
                weaponDiv.className = `weapon-item ${isActive ? 'active' : ''}`;
                weaponDiv.innerHTML = `
                    <div class="item-name">${weapon.name}</div>
                    <div class="item-stats">DMG: ${weapon.damage} | Fire: ${weapon.fireRate}</div>
                    ${owned ? '<div class="item-stats" style="color: #00ff00;">✓ Owned</div>' : `<div class="item-price">Cost: ${weapon.cost} 💰</div>`}
                `;
                
                if (owned) {
                    weaponDiv.onclick = () => selectWeapon(weaponName);
                } else {
                    weaponDiv.onclick = () => buyItem(weaponName, weapon.cost);
                }
                
                weaponsList.appendChild(weaponDiv);
            }
        }

        // Render Skins List
        function renderSkins() {
            const skinsList = document.getElementById('skinsList');
            skinsList.innerHTML = '';
            
            for (const skinName in skins) {
                const skin = skins[skinName];
                const owned = gameState.inventory.skins.includes(skinName);
                const isActive = gameState.currentSkin === skinName;
                
                const skinDiv = document.createElement('div');
                skinDiv.className = `skin-item ${isActive ? 'active' : ''}`;
                skinDiv.innerHTML = `
                    <div class="item-name">${skin.name}</div>
                    ${owned ? '<div class="item-stats" style="color: #00ff00;">✓ Owned</div>' : `<div class="item-price">Cost: ${skin.cost} 💰</div>`}
                `;
                
                if (owned) {
                    skinDiv.onclick = () => selectSkin(skinName);
                } else {
                    skinDiv.onclick = () => buyItem(skinName, skin.cost);
                }
                
                skinsList.appendChild(skinDiv);
            }
        }

        // Render Finishers List
        function renderFinishers() {
            const finishersList = document.getElementById('finishersList');
            finishersList.innerHTML = '';
            
            for (const finisherName in finishers) {
                const finisher = finishers[finisherName];
                const owned = gameState.inventory.finishers.includes(finisherName);
                const isActive = gameState.currentFinisher === finisherName;
                
                const finisherDiv = document.createElement('div');
                finisherDiv.className = `skin-item ${isActive ? 'active' : ''}`;
                const costDisplay = finisher.gems ? `${finisher.cost} 💎` : `${finisher.cost} 💰`;
                finisherDiv.innerHTML = `
                    <div class="item-name">${finisher.name}</div>
                    ${owned ? '<div class="item-stats" style="color: #00ff00;">✓ Owned</div>' : `<div class="item-price">Cost: ${costDisplay}</div>`}
                `;
                
                if (owned) {
                    finisherDiv.onclick = () => selectFinisher(finisherName);
                } else {
                    finisherDiv.onclick = () => buyItem(finisherName, finisher.cost, finisher.gems || false);
                }
                
                finishersList.appendChild(finisherDiv);
            }
        }

        // Render Shop
        function renderShop() {
            const shopItems = document.getElementById('shopItems');
            shopItems.innerHTML = '';
            
            const shopOffers = [
                { name: 'Coin Pack', amount: 500, cost: 5, type: 'coins' },
                { name: 'Gem Pack', amount: 25, cost: 5, type: 'gems' },
                { name: 'Premium Bundle', amount: 'coins: 1000 + gems: 50', cost: 10, type: 'bundle' }
            ];
            
            shopOffers.forEach(offer => {
                const shopItem = document.createElement('div');
                shopItem.className = 'shop-item';
                shopItem.innerHTML = `
                    <div class="shop-item-title">${offer.name}</div>
                    <div style="font-size: 12px; color: #ddd; margin-bottom: 10px;">Get: ${offer.amount}</div>
                    <div class="shop-item-price">$${offer.cost} USD</div>
                    <button style="margin-top: 10px; background: #00ff00;" onclick="processPayment('${offer.name}', ${offer.cost})">
                        Buy with Card
                    </button>
                `;
                shopItems.appendChild(shopItem);
            });
        }

        function processPayment(itemName, price) {
            alert(`Payment processing:\n\n${itemName}\nPrice: $${price}\n\n(This is a simulated payment. In production, integrate with Stripe/PayPal)`);
        }

        // Main Render UI
        function renderUI() {
            renderWeapons();
            renderSkins();
            renderFinishers();
            renderShop();
        }

        // Game Loop
        function gameLoop() {
            // Clear canvas
            ctx.fillStyle = 'rgba(26, 26, 46, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw enemies
            enemies.forEach(enemy => {
                enemy.update();
                enemy.draw();
            });

            // Spawn enemies if none left
            if (enemies.length === 0 && gameState.kills > 0 && gameState.gameRunning) {
                spawnEnemies();
            }

            // Draw crosshair
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 2;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            ctx.beginPath();
            ctx.moveTo(centerX - 20, centerY);
            ctx.lineTo(centerX + 20, centerY);
            ctx.moveTo(centerX, centerY - 20);
            ctx.lineTo(centerX, centerY + 20);
            ctx.stroke();

            // Draw weapon name
            ctx.fillStyle = '#00ff00';
            ctx.font = '16px Arial';
            const weapon = weapons[gameState.currentWeapon];
            ctx.fillText(`${weapon.name} [${gameState.weaponStats.ammo}/${gameState.weaponStats.maxAmmo}]`, 10, 30);

            // Draw current skin and finisher
            ctx.fillText(`Skin: ${gameState.currentSkin.toUpperCase()}`, 10, 55);
            ctx.fillText(`Finisher: ${gameState.currentFinisher.toUpperCase()}`, 10, 80);

            requestAnimationFrame(gameLoop);
        }

        function restartGame() {
            gameState.kills = 0;
            gameState.gameRunning = true;
            gameState.health = 100;
            enemies = [];
            spawnEnemies();
            document.getElementById('gameOverScreen').classList.remove('show');
            updateStats();
            gameLoop();
        }

        // Initial Setup
        updateStats();
        renderUI();
        spawnEnemies();
        gameLoop();
    </script>
</body>
</html>
